version: '3.8'

services:
  nginx:
    image: nginx:1.25-alpine
    container_name: databridge_nginx
    ports:
      - "8082:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - databridge

  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: databridge_php
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
    environment:
      APP_NAME: "DataBridge CRM"
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-databridge}
      DB_USERNAME: ${DB_USERNAME:-dbuser}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - databridge

  mysql:
    image: mysql:8.0
    container_name: databridge_mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-databridge}
      MYSQL_USER: ${DB_USERNAME:-dbuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - databridge

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: databridge_cloudflared
    command: tunnel --no-autoupdate --url http://nginx:80
    depends_on:
      - nginx
    networks:
      - databridge
    restart: unless-stopped
    profiles:
      - tunnel

volumes:
  mysql_data:

networks:
  databridge:
    driver: bridge
