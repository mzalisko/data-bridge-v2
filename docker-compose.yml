version: '3.8'

services:
  nginx:
    image: nginx:1.25-alpine
    container_name: databridge_nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - databridge

  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: databridge_php
    volumes:
      - .:/var/www/html
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-databridge}
      - DB_USER=${DB_USER:-dbuser}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - APP_ENV=${APP_ENV:-development}
      - APP_URL=${APP_URL:-http://localhost:8080}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - databridge

  mysql:
    image: mysql:8.0
    container_name: databridge_mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ${DB_NAME:-databridge}
      MYSQL_USER: ${DB_USER:-dbuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - databridge

volumes:
  mysql_data:

networks:
  databridge:
    driver: bridge
